<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Espace personnel — mandar170</title>
  <meta name="description" content="Hub personnel mandar170 : nutrition, lifestyle, budget et suivi." />
  <link rel="manifest" href="/manifest.json" />
  <link rel="icon" type="image/svg+xml" href="assets/icons/icon.svg" />
  <link rel="icon" type="image/png" sizes="32x32" href="assets/icons/icon-32.png" />
  <link rel="apple-touch-icon" href="assets/icons/icon-180.png" />
  <meta name="theme-color" content="#07070e" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Mandar170" />
  <!-- The dock + iframe shell was removed: the app is now self-navigating via a
       bottom module bar on each page. This PWA entry point just forwards to the
       last-visited module (default: nutrition). -->
  <script>
    (function () {
      var valid = ['lifestyle.html', 'nutrition.html', 'budget.html'];
      var last = null;
      try { last = localStorage.getItem('mandar170_last_module'); } catch (e) {}
      location.replace(valid.indexOf(last) >= 0 ? last : 'nutrition.html');
    })();
  </script>
</head>
<body style="background:#07070e;"></body>
</html>
