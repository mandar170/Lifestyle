<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nutrition — TEST HARNESS</title>
  <!-- Real stylesheet + real app script under test. Only the Supabase client
       is swapped for the in-memory stub. -->
  <link rel="stylesheet" href="/assets/css/main.css" />
</head>
<body>

  <header class="fit-header">
    <div class="container fit-header__inner">
      <div class="fit-header__brand">
        <span class="fit-header__logo" style="color:#f97316;">NUTRITION</span>
      </div>
    </div>
  </header>

  <main class="container" style="padding-top:12px;padding-bottom:60px;">

    <div class="tabs" role="tablist">
      <button class="tab-btn active" role="tab" aria-selected="true"  aria-controls="panel-journal"  data-tab="journal">📝 Journal</button>
      <button class="tab-btn"        role="tab" aria-selected="false" aria-controls="panel-pantry"   data-tab="pantry">🥫 Pantry</button>
      <button class="tab-btn"        role="tab" aria-selected="false" aria-controls="panel-courses"  data-tab="courses">🛒 Courses</button>
      <button class="tab-btn"        role="tab" aria-selected="false" aria-controls="panel-gestion"  data-tab="gestion">⚙️ Gestion</button>
    </div>

    <!-- ===== JOURNAL ===== -->
    <div class="tab-panel active" id="panel-journal">
      <div class="section-card day-summary">
        <div class="day-summary__head">
          <span class="section-card__title" style="font-size:12px;">Résumé — <span id="j-selected-day-label"></span></span>
        </div>
        <div class="day-summary__body">
          <div class="cal-ring" id="cal-ring">
            <div class="cal-ring__v"><b id="j-total-kcal">—</b><span id="j-cal-goal">kcal</span></div>
          </div>
          <div class="macro-bars" id="macro-bars"></div>
        </div>
        <div class="day-chips">
          <div class="day-chip">
            <span class="day-chip__ic">💧</span>
            <div class="day-chip__body">
              <span class="day-chip__t">Eau</span>
              <span class="day-chip__n" id="j-water-display">— ml</span>
            </div>
            <div class="day-chip__acts">
              <button class="btn btn--ghost btn--xs" onclick="addWater(250)">+250</button>
              <button class="btn btn--ghost btn--xs" onclick="addWater(500)">+500</button>
            </div>
          </div>
          <div class="day-chip" id="substitute-indicator"></div>
        </div>
        <input type="hidden" id="j-water" />
        <div id="goals-progress" hidden></div>
      </div>

      <div id="journal-day-view">
        <div class="journal-week-nav">
          <button class="btn btn--ghost btn--sm" onclick="stepDay(-1)">←</button>
          <span class="journal-week-label" id="jd-label"></span>
          <button class="btn btn--ghost btn--sm" onclick="stepDay(1)">→</button>
          <button class="btn btn--ghost btn--sm" onclick="weekToday()" style="margin-left:auto;">Aujourd'hui</button>
          <button class="btn btn--ghost btn--sm journal-view-toggle" onclick="toggleJournalView()">📆 Semaine</button>
        </div>
        <div id="day-meal-list" class="day-meal-list"></div>
      </div>

      <div id="journal-week-view">
        <div class="journal-week-nav">
          <button class="btn btn--ghost btn--sm" onclick="weekNav(-1)">←</button>
          <span class="journal-week-label" id="jw-label"></span>
          <button class="btn btn--ghost btn--sm" onclick="weekNav(1)">→</button>
          <button class="btn btn--ghost btn--sm" onclick="weekToday()" style="margin-left:auto;">Aujourd'hui</button>
          <button class="btn btn--ghost btn--sm journal-view-toggle" onclick="toggleJournalView()">📅 Jour</button>
        </div>
        <div class="meal-table-wrap">
          <table class="meal-table" id="meal-table"></table>
        </div>
      </div>
    </div>

    <div class="tab-panel" id="panel-pantry">
      <div id="pantry-list"></div>
      <div id="pantry-add-form" style="display:none;">
        <input type="text" id="pantry-search" oninput="renderPantrySearch()" />
        <div id="pantry-search-results"></div>
        <input type="number" id="pantry-qty" />
        <span id="pantry-unit-label"></span>
        <div id="pantry-selected"></div>
      </div>
    </div>
    <div class="tab-panel" id="panel-courses">
      <p id="courses-period"></p>
      <div id="shopping-list-content"></div>
    </div>

    <!-- ===== GESTION ===== -->
    <div class="tab-panel" id="panel-gestion">
      <div class="section-card" style="margin-bottom:24px;">
        <div class="section-card__header">
          <span class="section-card__title">Objectifs journaliers</span>
          <button class="btn btn--primary btn--sm" onclick="saveGoals()">Sauvegarder</button>
        </div>
        <div class="meal-macros-labels"><span>kcal/j</span><span>Prot (g)</span><span>Gluc (g)</span><span>Lip (g)</span><span>Fib (g)</span></div>
        <div class="meal-macros">
          <input type="number" id="goal-kcal" class="np-input" placeholder="2000" min="0" />
          <input type="number" id="goal-prot" class="np-input" placeholder="150" min="0" step="0.1" />
          <input type="number" id="goal-gluc" class="np-input" placeholder="200" min="0" step="0.1" />
          <input type="number" id="goal-lip"  class="np-input" placeholder="70" min="0" step="0.1" />
          <input type="number" id="goal-fib"  class="np-input" placeholder="30" min="0" step="0.1" />
        </div>
        <div style="display:flex;align-items:center;gap:10px;margin-top:14px;">
          <label for="goal-substitute">💊 Substituts / jour</label>
          <input type="number" id="goal-substitute" class="np-input" style="width:80px;" placeholder="4" min="0" step="1" />
        </div>
      </div>
      <div id="food-list"></div>
      <div id="tag-list"></div>
      <div id="nf-tags"></div>
      <div id="equivalence-list"></div>
      <select id="eq-food-a"></select>
      <select id="eq-food-b"></select>
    </div>

  </main>

  <!-- ===== MEAL MODAL ===== -->
  <div class="modal-overlay" id="meal-modal" aria-hidden="true" onclick="if(event.target===this)requestCloseMealModal()">
    <div class="modal-box modal-box--wide">
      <button class="modal-close" onclick="requestCloseMealModal()">✕</button>
      <div class="modal-title"><span id="mm-title">Repas</span><span class="mm-dirty-dot" id="mm-dirty-indicator">●&nbsp;non enregistré</span></div>
      <div class="modal-sub" id="mm-date-label"></div>

      <div class="meal-state-seg" id="meal-state-seg">
        <button type="button" data-state="planned" onclick="setMealState('planned')">◷ Prévu</button>
        <button type="button" data-state="logged" onclick="setMealState('logged')">✓ Mangé</button>
      </div>
      <div class="meal-state-hint" id="meal-state-hint"></div>

      <div class="food-picker" id="fp-modal">
        <input type="text" class="np-input food-search" id="fp-search-modal" placeholder="Rechercher un aliment…" oninput="renderFoodPickerContent('modal')" />
        <div class="food-picker-list" id="fp-list-modal"></div>
        <div class="food-weight-row" id="fp-weight-modal" style="display:none;">
          <span id="fp-fname-modal" style="font-size:12px;color:var(--primary);flex:1;min-width:80px;"></span>
          <input type="number" id="fp-grams-modal" class="np-input" placeholder="g" min="1" style="width:80px;padding:6px 8px;" onkeydown="if(event.key==='Enter')applyFoodToJournal('modal')" />
          <button class="btn btn--primary btn--sm" onclick="applyFoodToJournal('modal')">+ Ajouter</button>
        </div>
      </div>
      <label class="meal-deduct-label" style="margin:8px 0 4px;">
        <input type="checkbox" id="deduct-modal" checked style="accent-color:var(--primary);" />
        Déduire du stock
      </label>

      <div class="meal-food-items" id="mfi-modal" style="margin-top:8px;"></div>

      <input type="text" class="meal-desc" id="desc-modal" placeholder="Contenu du repas…" style="width:100%;margin:10px 0;" oninput="this.dataset.auto='0';updateModalDirtyIndicator()" />

      <div class="meal-macros-labels"><span>kcal</span><span>Prot</span><span>Gluc</span><span>Lip</span><span>Fib</span></div>
      <div class="meal-macros">
        <input type="number" id="kcal-modal" placeholder="—" min="0" oninput="updateModalDirtyIndicator()" />
        <input type="number" id="prot-modal" placeholder="—" min="0" step="0.1" oninput="updateModalDirtyIndicator()" />
        <input type="number" id="gluc-modal" placeholder="—" min="0" step="0.1" oninput="updateModalDirtyIndicator()" />
        <input type="number" id="lip-modal"  placeholder="—" min="0" step="0.1" oninput="updateModalDirtyIndicator()" />
        <input type="number" id="fib-modal"  placeholder="—" min="0" step="0.1" oninput="updateModalDirtyIndicator()" />
      </div>

      <div class="form-actions" style="margin-top:20px;">
        <button class="btn btn--primary" id="meal-save-btn" style="width:100%;" onclick="saveMealFromModal()">✓ Ajouter au journal</button>
      </div>
    </div>
  </div>

  <!-- ===== MEAL MODAL — CONFIRM CLOSE ===== -->
  <div class="modal-overlay" id="meal-modal-confirm" aria-hidden="true">
    <div class="modal-box" style="max-width:340px;text-align:center;">
      <div class="modal-title" style="font-size:16px;">Modifications non enregistrées</div>
      <p class="modal-sub">Voulez-vous enregistrer vos modifications avant de fermer ?</p>
      <div style="display:flex;gap:10px;justify-content:center;">
        <button class="btn btn--ghost btn--sm" id="confirm-discard-btn" onclick="discardMealModalChanges()">Ne pas enregistrer</button>
        <button class="btn btn--primary btn--sm" id="confirm-save-btn" onclick="saveAndCloseMealModal()">Enregistrer</button>
      </div>
    </div>
  </div>

  <!-- ===== BARCODE SCANNER ===== -->
  <div class="modal-overlay" id="barcode-modal" aria-hidden="true" onclick="if(event.target===this)closeBarcodeScanner()">
    <div class="modal-box" style="max-width:420px;">
      <button class="modal-close" onclick="closeBarcodeScanner()">✕</button>
      <div class="modal-title" style="font-size:16px;">Scanner un produit</div>
      <div id="bc-scan-view">
        <video id="bc-video" autoplay playsinline muted style="width:100%;border-radius:10px;background:#000;"></video>
        <div style="text-align:center;margin-top:10px;">
          <button class="btn btn--ghost btn--sm" onclick="switchToManualBarcodeEntry()">Saisir le code manuellement</button>
        </div>
      </div>
      <div id="bc-manual-view" style="display:none;">
        <input type="text" id="bc-manual-code" class="np-input" placeholder="Code-barre…" inputmode="numeric" style="width:100%;margin-bottom:8px;" onkeydown="if(event.key==='Enter')lookupBarcode(this.value)" />
        <button class="btn btn--primary btn--sm" style="width:100%;" onclick="lookupBarcode(document.getElementById('bc-manual-code').value)">Rechercher</button>
      </div>
      <div id="bc-result-view" style="display:none;"></div>
    </div>
  </div>

  <script src="/tests/fixtures/stub-db.js"></script>
  <script src="/assets/js/nutrition.js"></script>
</body>
</html>
